<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💙</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', sans-serif;
}

body{
  height:90vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  overflow:hidden;

  background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #ffdde1);
  background-size: 300% 300%;
  animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}  
  
}

.container{
  width:85%;
  max-width:360px;
  padding:30px 25px;
  border-radius:25px;

  background: rgba(255, 255, 255, 0.35);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);

  box-shadow: 0 15px 40px rgba(0,0,0,0.15);
  
  animation: fadeInBox 0.8s ease;
  border: 1px solid rgba(255, 105, 180, 0.3);
}

h2{
  margin-bottom:15px;
  color:#003366;
  transition:0.5s;
}

p{
  color:#004080;
  margin-bottom:20px;
  transition:0.5s;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:25px;
  background:#0077ff;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#0055cc;
}

.gallery{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:12px;
  max-width:330px;   /* lebih kecil */
  margin:auto;
}

.card{
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
  opacity:0;
  transform:translateY(20px);
  transition:0.6s;
}

.card{
  position: relative;
  border-radius: 20px;
  padding: 3px;
  background: linear-gradient(45deg, #ff4e50, #ff9a9e, #fbc2eb);
  background-size: 300% 300%;
  animation: borderMove 6s linear infinite;
  box-shadow: 0 10px 25px rgba(255, 0, 80, 0.3);
  overflow: hidden;
  transition: 0.4s;
}

.card:hover{
  transform: scale(1.05);
}

.card img{
  width: 100%;
  height: 130px;
  object-fit: cover;
  border-radius: 17px;
  display: block;
}
  
  
}

.caption{
  padding:8px;
  font-size:13px;
  color:#003366;
}

.showCard{
  opacity:1;
  transform:translateY(0);
}

/* Love Animation */
.love{
  position:fixed;
  top:-20px;
  font-size:18px;
  animation:fall linear forwards;
  pointer-events:none;
  z-index:999;
}

@keyframes fall{
  to{
    transform:translateY(110vh);
    opacity:0;
  }
}

.fallingPhoto{
  position:fixed;
  top:-50px;
  animation:fallPhoto linear forwards;
  pointer-events:none;
  z-index:999;
}

@keyframes fallPhoto{
  0%{
    transform:translateY(-50px) rotate(0deg);
  }
  100%{
    transform:translateY(110vh) rotate(360deg);
    opacity:0;
  }
}

/* Love blur background di gallery */
.gallery{
  position: relative;
  z-index: 2;
}

.love-bg{
  position: absolute;
  font-size: 80px;
  color: rgba(255, 0, 0, 0.25);
  filter: blur(8px);
  animation: floatLove 6s ease-in-out infinite alternate;
  pointer-events: none;
  z-index: 1;
}

@keyframes floatLove{
  from{
    transform: translateY(0px);
  }
  to{
    transform: translateY(20px);
  }
}

@keyframes borderMove {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}

@keyframes fadeInBox{
  from{
    opacity:0;
    transform: translateY(20px);
  }
  to{
    opacity:1;
    transform: translateY(0);
  }
}

</style>
</head>

<body>

<div class="container">
  <h2 id="title">Aku ada sesuatu...</h2>
  <p id="text">Tapi kamu harus janji ga ketawa dulu 😌</p>
  <button onclick="nextStep()" id="btn">Lanjut ga?</button>

  <div class="gallery" id="gallery">
    <div class="card">
      <img src="imut.jpg">
      <div class="caption">Senyummu selalu bikin tenang 🤍</div>
    </div>
    <div class="card">
      <img src="imut2.jpg">
      <div class="caption">Aku suka cara kamu jadi diri sendiri ✨</div>
    </div>
    <div class="card">
      <img src="imut3.jpg">
      <div class="caption">Kamu itu rumah yang nyaman 💙</div>
    </div>
    <div class="card">
      <img src="imut 6.jpg">
      <div class="caption">Dan aku bersyukur banget punya kamu 🤍</div>
    </div>
  </div>
</div>

<audio id="bgMusic" loop>
  <source src="musik.mp3" type="audio/mpeg">
</audio>

<script>
let step = 0;
const title = document.getElementById("title");
const text = document.getElementById("text");
const btn = document.getElementById("btn");
const gallery = document.getElementById("gallery");
const music = document.getElementById("bgMusic");

function nextStep(){
  step++;

  if(step === 1){
    title.innerText = "Sebenernya...";
    text.innerText = "Ga ada hari spesial apa-apa kok. Aku cuma lagi kepikiran kamu.";
    btn.innerText = "Serius?";
  }
  else if(step === 2){
    title.innerText = "Iya Serius.";
    text.innerText = "Dan ini alasannya kenapa";
    btn.style.display = "none";
    showGallery();
  }
}

function showGallery(){
  gallery.style.display = "grid";
  music.play();

  const cards = document.querySelectorAll(".card");
  cards.forEach((card,i)=>{
    setTimeout(()=>{
      card.classList.add("showCard");
    }, i*400);
  });

  setInterval(createLove,500);
  
  // Tambah love blur background
for(let i = 0; i < 6; i++){
  const love = document.createElement("div");
  love.className = "love-bg";
  love.innerHTML = "❤️";
  love.style.top = Math.random() * 80 + "%";
  love.style.left = Math.random() * 80 + "%";
  love.style.fontSize = (Math.random()*60 + 60) + "px";
  gallery.appendChild(love);
}
  
}

function createLove(){
  const photo = document.createElement("img");
  photo.src = "bucket.png"; // ganti sesuai nama file lu
  photo.className = "fallingPhoto";

  photo.style.left = Math.random()*100+"vw";
  photo.style.width = (Math.random()*30 + 40)+"px";
  photo.style.animationDuration = (Math.random()*4 + 4)+"s";

  document.body.appendChild(photo);

  setTimeout(()=>{
    photo.remove();
  },8000);
}
</script>

</body>
</html>
